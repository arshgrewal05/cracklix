<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Cracklix</title>
    <style>
        :root {
            --primary: #1677FF;
            --bg: #FFFFFF;
            --text: #0F172A;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 24px;
        }
        .icon-container {
            width: 80px;
            height: 80px;
            background: rgba(22, 119, 255, 0.1);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
        }
        .icon {
            width: 40px;
            height: 40px;
            color: var(--primary);
        }
        h1 {
            font-size: 24px;
            font-weight: 900;
            margin: 0 0 12px 0;
            text-transform: uppercase;
            letter-spacing: -0.02em;
        }
        p {
            color: #64748B;
            font-size: 16px;
            max-width: 300px;
            margin: 0 0 32px 0;
            line-height: 1.5;
        }
        button {
            background-color: var(--text);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 12px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 12px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="icon-container">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
        </svg>
    </div>
    <h1>You are Offline</h1>
    <p>Please check your internet connection to access the preparation hub.</p>
    <button onclick="window.location.reload()">Retry Connection</button>
</body>
</html>
