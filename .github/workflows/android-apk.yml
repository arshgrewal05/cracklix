name: Build Android APK - Production

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: Build & Sign APK
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript Check
        run: npm run typecheck

      - name: Build Next.js app
        run: npm run build:android

      - name: Export to www
        run: |
          rm -rf www
          mkdir -p www
          cp -r .next/static www/ || true
          cp -r public/* www/ || true

      - name: Sync Capacitor
        run: npx cap sync android

      # ✅ Keystore Setup (Hardened for Node 22+)
      - name: Setup Keystore
        run: |
          if [[ -n "${{ secrets.KEYSTORE_BASE64 }}" ]]; then
            echo "🔐 Decoding release keystore..."
            printf '%s' "${{ secrets.KEYSTORE_BASE64 }}" | tr -d '\n ' | base64 -d > release.keystore
            echo "KEYSTORE_TYPE=RELEASE" >> $GITHUB_ENV
          else
            echo "⚠️ No keystore found, generating debug..."
            mkdir -p ~/.android
            keytool -genkeypair -v \
              -keystore ~/.android/debug.keystore \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
            echo "KEYSTORE_TYPE=DEBUG" >> $GITHUB_ENV
          fi

      # ✅ Build Release APK
      - name: Build Android App
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      # ✅ Sign APK (Discovery Hardened)
      - name: Sign APK
        run: |
          APK_PATH=$(find android/app/build/outputs/apk -name "*.apk" | head -n 1)

          if [[ -z "$APK_PATH" ]]; then
            echo "❌ No APK found"
            exit 1
          fi

          echo "📦 APK found: $APK_PATH"

          if [[ "$KEYSTORE_TYPE" == "RELEASE" ]]; then
            echo "🔐 Signing RELEASE APK..."
            jarsigner -verbose \
              -sigalg SHA256withRSA \
              -digestalg SHA-256 \
              -keystore release.keystore \
              -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
              -keypass "${{ secrets.KEY_PASSWORD }}" \
              "$APK_PATH" \
              "${{ secrets.KEY_ALIAS }}"
          else
            echo "🔐 Signing DEBUG APK..."
            jarsigner -verbose \
              -sigalg SHA256withRSA \
              -digestalg SHA-256 \
              -keystore ~/.android/debug.keystore \
              -storepass android \
              -keypass android \
              "$APK_PATH" \
              androiddebugkey
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cracklix-build
          path: android/app/build/outputs/apk/**/*.apk
